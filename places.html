<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viana Places 2026</title>
  <meta name="description" content="Die besten Locations, Ausflugsziele, Clubs und mehr – sortiert nach Entfernung von Nürnberg">
  <link rel="icon" type="image/png" href="assets/icon-96x96.png">
  <link rel="apple-touch-icon" href="assets/icon-128x128.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=20260416">
  <link rel="stylesheet" href="css/places.css?v=20260416">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── BURGER BUTTON ── */
.burger-btn {
  position: fixed;
  top: 16px; left: 16px;
  z-index: 9000;
  width: 44px; height: 44px;
  background: rgba(22,24,31,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: var(--text, #f1f2f4);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.burger-btn:hover {
  border-color: rgba(232,150,58,0.4);
  color: #e8963a;
  background: rgba(22,24,31,0.95);
}

/* ── NAV DRAWER ── */
.nav-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 9500;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.nav-overlay.open { opacity: 1; pointer-events: all; }

.nav-drawer {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 270px;
  background: #16181f;
  border-right: 1px solid rgba(255,255,255,0.07);
  z-index: 9600;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
}
.nav-drawer.open { transform: translateX(0); }

.nav-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.nav-drawer-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.3rem; font-weight: 800;
  color: #e8963a;
}
.nav-drawer-close {
  background: none; border: 1px solid rgba(255,255,255,0.08);
  color: #6b7280; font-size: 20px; line-height: 1;
  cursor: pointer; padding: 5px 10px;
  border-radius: 8px;
  transition: all 0.15s;
}
.nav-drawer-close:hover { color: #f1f2f4; border-color: rgba(255,255,255,0.18); }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 15px 20px;
  color: #6b7280; text-decoration: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: all 0.15s ease;
}
.nav-item:hover { color: #f1f2f4; background: rgba(255,255,255,0.03); }
.nav-item.nav-active { color: #e8963a; background: rgba(232,150,58,0.07); }
.nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }

@media (max-width: 600px) {
  .burger-btn { top: 12px; left: 12px; width: 40px; height: 40px; font-size: 16px; }
}
/* Modal offen → Burger ausblenden */
body:has(#place-modal-bg.open) .burger-btn { display: none; }
</style>
</head>
<body>

<!-- BURGER BUTTON -->
<button class="burger-btn" id="burger-btn" aria-label="Menü öffnen">☰</button>

<!-- NAV DRAWER -->
<div class="nav-overlay" id="nav-overlay"></div>
<nav class="nav-drawer" id="nav-drawer" aria-label="Navigation">
  <div class="nav-drawer-header">
    <div class="nav-drawer-logo"><span style="color:#fff">Vi</span><span style="color:#e8963a">ana</span></div>
    <button class="nav-drawer-close" id="nav-close" aria-label="Schließen">×</button>
  </div>
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Startseite</a>
  <a href="events.html" class="nav-item"><span class="nav-icon">🎉</span> Events</a>
  <a href="places.html" class="nav-item nav-active"><span class="nav-icon">📍</span> Places</a>
  <div style="height:1px;background:rgba(255,255,255,0.06);margin:8px 0"></div>
  <a href="vorschlagen.html" class="nav-item" style="color:#34d399"><span class="nav-icon">📝</span> Event vorschlagen</a>
</nav>


<header>
  <div class="header-badge"><span style="color:#fff">Vi</span><span style="color:#e8963a">ana</span> Places 2026</div>
  <h1 class="header-title"><span style="color:#fff">Vi</span><span style="color:#e8963a">ana</span> Places</h1>
  <p class="header-sub">Die besten Locations, Ausflugsziele & mehr rund um Nürnberg</p>
</header>


<main class="places-wrapper">

  <!-- CATEGORY GRID (default view) -->
  <div id="cat-grid" class="cat-grid"></div>

  <!-- LIST VIEW (shown when category is selected) -->
  <div id="places-list-section" style="display:none">
    <div class="places-header-bar">
      <button class="back-btn" onclick="backToCats()">← Kategorien</button>
      <div class="places-cat-title" id="places-cat-title"></div>
      <span id="places-count" style="font-size:12px;color:var(--muted)"></span>
    </div>

    <!-- Subcat pills -->
    <div class="subcat-pills" id="subcat-pills"></div>

    <!-- Controls -->
    <div class="places-controls">
      <div class="search-wrap">
        <input
          type="search"
          id="places-search"
          class="places-search"
          placeholder="Suchen..."
          autocomplete="off"
        >
      </div>
      <select id="places-sort" class="places-sort">
        <option value="dist">📍 Entfernung</option>
        <option value="alpha">🔤 A–Z</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="places-btn-list">≡ Liste</button>
        <button class="view-btn" id="places-btn-grid">⊞ Grid</button>
        <button class="view-btn" id="places-btn-map">🗺 Karte</button>
      </div>
    </div>

    <!-- Location & Radius filter -->
    <div class="location-bar">
      <div class="location-input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <input id="places-plz-input" type="text" placeholder="PLZ eingeben…" maxlength="5" inputmode="numeric">
      </div>
      <button class="loc-btn loc-btn-geo" id="places-geo-btn">📍 Standort ermitteln</button>
      <div class="dist-filter-wrap">
        <span>Radius:</span>
        <select class="dist-select" id="places-radius">
          <option value="9999">Alle</option>
          <option value="15">≤ 15 km</option>
          <option value="30">≤ 30 km</option>
          <option value="50">≤ 50 km</option>
          <option value="100">≤ 100 km</option>
          <option value="150">≤ 150 km</option>
          <option value="200">≤ 200 km</option>
        </select>
      </div>
      <div class="loc-status" id="places-loc-status"></div>
      <button class="loc-btn loc-btn-clear" id="places-loc-clear" style="display:none">✕ Standort löschen</button>
    </div>

    <!-- Places rows -->
    <div id="places-rows"></div>
    <!-- Map view -->
    <div id="places-map-wrap" style="display:none"></div>
  </div>

</main>

<footer style="text-align:center;padding:2.5rem 2rem;background:var(--surface);margin-top:2rem;font-size:13px;color:var(--muted)">
  <p style="margin-bottom:8px">Ein Projekt von <strong><span style="color:#fff">Vi</span><span style="color:#e8963a">ana</span></strong> &nbsp;·&nbsp; Alle Angaben ohne Gewähr &nbsp;·&nbsp; Stand April 2026</p>
  <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:8px">
    <a href="impressum.html" style="color:var(--accent);text-decoration:none">Impressum</a>
    <a href="datenschutz.html" style="color:var(--accent);text-decoration:none">Datenschutz</a>
    <a href="agb.html" style="color:var(--accent);text-decoration:none">AGB</a>
  </div>
</footer>

<!-- PLACE DETAIL MODAL -->
<div class="place-modal-bg" id="place-modal-bg" onclick="if(event.target===this)closePlaceModal()">
  <div class="place-modal" id="place-modal">
    <button class="place-modal-close" id="place-modal-close" onclick="closePlaceModal()">×</button>

    <div class="pm-header">
      <div class="pm-logo" id="pm-logo"></div>
      <div class="pm-header-text">
        <div class="pm-cat" id="pm-cat"></div>
        <div class="pm-name" id="pm-name"></div>
      </div>
      <div class="pm-dist" id="pm-dist"></div>
    </div>

    <div class="pm-addr" id="pm-addr"></div>
    <div class="pm-details" id="pm-details"></div>
    <div class="pm-tags" id="pm-tags"></div>
    <div class="pm-actions" id="pm-actions"></div>
  </div>
</div>

<button class="back-to-top" id="back-to-top" title="Nach oben">↑</button>
<div class="toast" id="toast"></div>

<script src="js/places.js?v=20260416"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    initPlaces();

    // Back to top
    const btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 400);
    });
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  });
</script>
<script src="js/cookie-banner.js?v=20260416"></script>
<script>
// ── BURGER MENU ──
(function() {
  const burgerBtn = document.getElementById('burger-btn');
  const navDrawer = document.getElementById('nav-drawer');
  const navOverlay = document.getElementById('nav-overlay');
  const navClose = document.getElementById('nav-close');

  function openNav() {
    navDrawer.classList.add('open');
    navOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeNav() {
    navDrawer.classList.remove('open');
    navOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  burgerBtn.addEventListener('click', openNav);
  navClose.addEventListener('click', closeNav);
  navOverlay.addEventListener('click', closeNav);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeNav();
      if (typeof closePlaceModal === 'function') closePlaceModal();
    }
  });
})();
</script>
</body>
</html>
