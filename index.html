<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nürnberg Events 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f13;
  --surface: #16181f;
  --surface2: #1e2029;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #6b7280;
  --accent: #e8963a;
  --accent2: #5b8ff9;

  --kaerwa: #c8974e;
  --festival: #5b8ff9;
  --afterwork: #a78bfa;
  --bierfest: #e8963a;
  --sonstige: #34d399;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  padding: 3rem 2rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(232,150,58,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.header-badge {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid rgba(232,150,58,0.3);
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 1.2rem;
}
h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.4rem, 6vw, 4.5rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 0.6rem;
}
h1 span { color: var(--accent); }
.header-sub {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 300;
}

/* STATS BAR */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
  margin: 2rem auto 0;
  max-width: 700px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  display: block;
}
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* CONTROLS */
.controls {
  max-width: 1300px;
  margin: 2.5rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 40px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: rgba(232,150,58,0.4); }
#search::placeholder { color: var(--muted); }

.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.pill.active { background: var(--accent); color: #0e0f13; border-color: var(--accent); font-weight: 600; }
.pill[data-cat="festival"].active { background: var(--festival); border-color: var(--festival); }
.pill[data-cat="kaerwa"].active { background: var(--kaerwa); border-color: var(--kaerwa); }
.pill[data-cat="afterwork"].active { background: var(--afterwork); border-color: var(--afterwork); }
.pill[data-cat="bierfest"].active { background: var(--bierfest); border-color: var(--bierfest); }
.pill[data-cat="sonstige"].active { background: var(--sonstige); border-color: var(--sonstige); }

/* VIEW TOGGLE */
.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
}
.view-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.view-btn.active { background: var(--surface2); color: var(--text); }

/* CALENDAR AREA */
.cal-wrap {
  max-width: 1300px;
  margin: 1.5rem auto 4rem;
  padding: 0 1.5rem;
}

/* MONTH SECTION */
.month-block {
  margin-bottom: 3rem;
}
.month-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.month-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}
.month-count {
  font-size: 12px;
  color: var(--muted);
}

/* LIST VIEW */
.events-list { display: flex; flex-direction: column; gap: 8px; }

.event-row {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 1rem;
  align-items: start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.event-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--cat-color, var(--muted));
  border-radius: 3px 0 0 3px;
}
.event-row:hover { background: var(--surface2); border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }

.event-date-col { text-align: center; padding-top: 2px; }
.event-day { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; line-height: 1; color: var(--text); }
.event-month { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.event-dow { font-size: 10px; color: var(--muted); }

.event-info {}
.event-name { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; }
.event-loc { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
.event-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid;
  white-space: nowrap;
}
.badge-free { background: rgba(52,211,153,0.12); color: #34d399; border-color: rgba(52,211,153,0.3); }
.badge-date { background: transparent; color: var(--muted); border-color: var(--border); }
.badge-dc { background: rgba(167,139,250,0.12); color: #c4b5fd; border-color: rgba(167,139,250,0.3); }
.badge-new { background: rgba(232,150,58,0.15); color: var(--accent); border-color: rgba(232,150,58,0.3); }

.event-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; padding-top: 2px; }
.cat-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  color: #0e0f13;
  white-space: nowrap;
}

/* GRID VIEW */
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.event-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--cat-color, var(--muted));
}
.event-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.card-date { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.card-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; line-height: 1.25; }
.card-loc { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.card-desc { font-size: 11px; color: rgba(240,240,240,0.55); line-height: 1.5; margin-bottom: 10px; }
.card-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }

/* DETAIL MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  max-width: 520px;
  width: 100%;
  padding: 2rem;
  position: relative;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  line-height: 1;
  transition: all 0.15s;
}
.modal-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.modal-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.4rem; }
.modal-date-loc { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 3px; }
.modal-desc { font-size: 14px; line-height: 1.7; color: rgba(240,240,240,0.7); margin-bottom: 1.2rem; }
.modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
.modal-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--accent); text-decoration: none;
  border: 1px solid rgba(232,150,58,0.3);
  padding: 8px 16px;
  border-radius: 8px;
  transition: all 0.15s;
}
.modal-link:hover { background: rgba(232,150,58,0.1); }

/* EMPTY */
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

/* FOOTER */
footer {
  text-align: center;
  padding: 2.5rem 2rem;
  color: var(--muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
}
.footer-owner {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
  margin-bottom: 0.4rem;
}
.footer-owner span { color: var(--accent); }

/* MODAL ACTIONS */
.modal-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 1rem;
}
.modal-action-btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  padding: 9px 14px;
  border-radius: 9px;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  background: transparent;
}
.btn-gmaps  { color: #4ade80; border-color: rgba(74,222,128,0.3); }
.btn-gmaps:hover  { background: rgba(74,222,128,0.1); }
.btn-apple  { color: #60a5fa; border-color: rgba(96,165,250,0.3); }
.btn-apple:hover  { background: rgba(96,165,250,0.1); }
.btn-wa     { color: #4ade80; border-color: rgba(74,222,128,0.25); }
.btn-wa:hover     { background: rgba(74,222,128,0.08); }
.btn-ticket { color: var(--accent); border-color: rgba(232,150,58,0.3); }
.btn-ticket:hover { background: rgba(232,150,58,0.1); }

/* SCROLL */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

@media (max-width: 600px) {
  .event-row { grid-template-columns: 48px 1fr; }
  .event-right { display: none; }
  .controls { gap: 0.75rem; }
  .stats-bar { gap: 1.2rem; }
}
</style>
</head>

let activeFilter = 'alle';
let searchTerm = '';
let viewMode = 'list';

function dateStr(s, e) {
  const sd = new Date(s), ed = new Date(e);
  if (s === e) return `${sd.getDate()}. ${MONTHS_S[sd.getMonth()]} 2026`;
  if (sd.getMonth() === ed.getMonth()) return `${sd.getDate()}.–${ed.getDate()}. ${MONTHS_S[sd.getMonth()]} 2026`;
  return `${sd.getDate()}. ${MONTHS_S[sd.getMonth()]} – ${ed.getDate()}. ${MONTHS_S[ed.getMonth()]} 2026`;
}

function render() {
  const q = searchTerm.toLowerCase();
  let filtered = events.filter(e => {
    const matchCat = activeFilter === 'alle' ? true
      : activeFilter === 'free' ? e.free
      : e.cat === activeFilter;
    const matchSearch = !q || e.name.toLowerCase().includes(q) || e.loc.toLowerCase().includes(q) || (e.genre||'').toLowerCase().includes(q) || (e.desc||'').toLowerCase().includes(q);
    return matchCat && matchSearch;
  }).sort((a,b) => a.start.localeCompare(b.start));

  document.getElementById('total-count').textContent = events.length;
  document.getElementById('free-count').textContent = events.filter(e=>e.free).length;

  const byMonth = {};
  filtered.forEach(e => {
    const m = parseInt(e.start.split('-')[1]) - 1;
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(e);
  });

  const cal = document.getElementById('cal');

  if (!filtered.length) {
    cal.innerHTML = `<div class="empty"><h3>Keine Events gefunden</h3><p>Versuch einen anderen Suchbegriff oder Filter.</p></div>`;
    return;
  }

  cal.innerHTML = Object.keys(byMonth).sort((a,b)=>+a-+b).map(m => {
    const evs = byMonth[m];
    const rows = viewMode === 'list'
      ? `<div class="events-list">${evs.map(eventRowHTML).join('')}</div>`
      : `<div class="events-grid">${evs.map(eventCardHTML).join('')}</div>`;
    return `<div class="month-block">
      <div class="month-header">
        <span class="month-name">${MONTHS[m]}</span>
        <span class="month-count">${evs.length} Event${evs.length!==1?'s':''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  // attach click handlers
  cal.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('click', () => openModal(parseInt(el.dataset.idx)));
  });
}

function eventRowHTML(e) {
  const col = CAT_COLORS[e.cat] || '#888';
  const sd = new Date(e.start);
  const idx = events.indexOf(e);
  return `<div class="event-row" data-idx="${idx}" style="--cat-color:${col}">
    <div class="event-date-col">
      <div class="event-day">${sd.getDate()}.</div>
      <div class="event-month">${MONTHS_S[sd.getMonth()]}.</div>
      <div class="event-dow">${DAYS[sd.getDay()]}</div>
    </div>
    <div class="event-info">
      <div class="event-name">${e.name}</div>
      <div class="event-loc">📍 ${e.loc}</div>
      <div class="event-meta">
        <span class="badge badge-date">${dateStr(e.start,e.end)}</span>
        ${e.free ? '<span class="badge badge-free">★ Kostenlos</span>' : ''}
        ${e.new ? '<span class="badge badge-new">NEU 2026</span>' : ''}
        ${e.dresscode ? `<span class="badge badge-dc">DC: ${e.dresscode}</span>` : ''}
      </div>
    </div>
    <div class="event-right">
      <span class="cat-badge" style="background:${col}">${CAT_LABELS[e.cat]}</span>
      ${e.genre ? `<span style="font-size:11px;color:var(--muted)">${e.genre}</span>` : ''}
    </div>
  </div>`;
}

function eventCardHTML(e) {
  const col = CAT_COLORS[e.cat] || '#888';
  const idx = events.indexOf(e);
  return `<div class="event-card" data-idx="${idx}" style="--cat-color:${col}">
    <div class="card-date">${dateStr(e.start,e.end)} · ${DAYS[new Date(e.start).getDay()]}.</div>
    <div class="card-name">${e.name}</div>
    <div class="card-loc">📍 ${e.loc}</div>
    ${e.desc ? `<div class="card-desc">${e.desc.slice(0,100)}${e.desc.length>100?'…':''}</div>` : ''}
    <div class="card-footer">
      <span class="cat-badge" style="background:${col}">${CAT_LABELS[e.cat]}</span>
      ${e.free ? '<span class="badge badge-free">★ Kostenlos</span>' : ''}
      ${e.new ? '<span class="badge badge-new">NEU</span>' : ''}
    </div>
  </div>`;
}

function openModal(idx) {
  const e = events[idx];
  const col = CAT_COLORS[e.cat] || '#888';
  document.getElementById('m-cat').textContent = CAT_LABELS[e.cat];
  document.getElementById('m-cat').style.color = col;
  document.getElementById('m-title').textContent = e.name;
  document.getElementById('m-date').textContent = '📅 ' + dateStr(e.start, e.end);
  document.getElementById('m-loc').textContent = '📍 ' + e.loc;
  document.getElementById('m-desc').textContent = e.desc || '—';

  const badges = [];
  if (e.free) badges.push('<span class="badge badge-free">★ Kostenlos / Eintritt frei</span>');
  if (e.new) badges.push('<span class="badge badge-new">NEU 2026</span>');
  if (e.dresscode) badges.push(`<span class="badge badge-dc">Dresscode: ${e.dresscode}</span>`);
  if (e.genre) badges.push(`<span class="badge badge-date">${e.genre}</span>`);
  document.getElementById('m-badges').innerHTML = badges.join('');

  // Build action buttons
  const locEncoded = encodeURIComponent(e.loc + ', Deutschland');
  const shareText = encodeURIComponent(
    `🎉 ${e.name}\n📅 ${dateStr(e.start, e.end)}\n📍 ${e.loc}\n${e.ticket || ''}`
  );
  const waUrl = `https://wa.me/?text=${shareText}`;
  const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${locEncoded}`;
  // iOS Maps: use maps:// URI which opens Apple Maps on iPhone, falls back to Google on desktop
  const appleMapsUrl = `https://maps.apple.com/?q=${locEncoded}`;

  let actions = `
    <a class="modal-action-btn btn-gmaps" href="${gmapsUrl}" target="_blank">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Google Maps
    </a>
    <a class="modal-action-btn btn-apple" href="${appleMapsUrl}" target="_blank">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Apple Maps
    </a>
    <a class="modal-action-btn btn-wa" href="${waUrl}" target="_blank">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp teilen
    </a>`;

  if (e.ticket) {
    actions += `<a class="modal-action-btn btn-ticket" href="${e.ticket}" target="_blank">
      🎟 Tickets / Mehr Infos
    </a>`;
  }

  document.getElementById('m-actions').innerHTML = actions;
  document.getElementById('modal-bg').classList.add('open');
}

// EVENTS
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('btn-list').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  render();
});
document.getElementById('btn-grid').addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  render();
});

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) document.getElementById('modal-bg').classList.remove('open');
});
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-bg').classList.remove('open');
});

render();
</script>
</body>
</html>
