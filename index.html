<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nürnberg Events 2026</title>
<meta name="description" content="Alle Events, Festivals, Kärwas und Feste in der Metropolregion Nürnberg 2026">
<meta name="theme-color" content="#0e0f13">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg:#0e0f13; --surface:#16181f; --surface2:#1e2029;
  --border:rgba(255,255,255,0.07); --text:#f0f0f0; --muted:#6b7280;
  --accent:#e8963a; --kaerwa:#c8974e; --festival:#5b8ff9;
  --afterwork:#a78bfa; --bierfest:#e8963a; --sonstige:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* HEADER */
header{padding:3rem 2rem 2rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(232,150,58,0.15) 0%,transparent 70%);pointer-events:none}
.header-badge{display:inline-block;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(232,150,58,.3);padding:4px 14px;border-radius:999px;margin-bottom:1.2rem}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,6vw,4.5rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:.6rem}
h1 span{color:var(--accent)}
.header-sub{font-size:1rem;color:var(--muted);font-weight:300}
.stats-bar{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin:2rem auto 0;max-width:700px}
.stat{text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text);display:block}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
/* COUNTDOWN BANNER */
.countdown-banner{max-width:1300px;margin:1.5rem auto 0;padding:0 1.5rem}
.countdown-card{background:linear-gradient(135deg,rgba(232,150,58,.12) 0%,rgba(91,143,249,.08) 100%);border:1px solid rgba(232,150,58,.25);border-radius:14px;padding:1rem 1.4rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;cursor:pointer;transition:all .2s}
.countdown-card:hover{border-color:rgba(232,150,58,.45)}
.countdown-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:600;white-space:nowrap}
.countdown-days{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1;white-space:nowrap}
.countdown-days span{font-size:1rem;font-weight:400;color:var(--muted);margin-left:4px}
.countdown-info{flex:1;min-width:0}
.countdown-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.countdown-date{font-size:12px;color:var(--muted);margin-top:2px}
.countdown-arrow{color:var(--muted);font-size:1.2rem}
/* CONTROLS */
.controls{max-width:1300px;margin:2.5rem auto 0;padding:0 1.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
#search:focus{border-color:rgba(232,150,58,.4)}
#search::placeholder{color:var(--muted)}
.search-suggestions{position:absolute;top:calc(100% + 4px);left:0;width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,.12);border-radius:12px;z-index:200;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);max-height:280px;overflow-y:auto;display:none}
.suggestion-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;font-size:13px}
.suggestion-item:hover{background:rgba(255,255,255,.06)}
.suggestion-item+.suggestion-item{border-top:1px solid var(--border)}
.suggestion-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;color:#0e0f13;white-space:nowrap;flex-shrink:0}
.suggestion-name{flex:1;font-weight:500}
.suggestion-date{font-size:11px;color:var(--muted);white-space:nowrap}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.pill:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.pill.active{background:var(--accent);color:#0e0f13;border-color:var(--accent);font-weight:600}
.pill[data-cat="festival"].active{background:var(--festival);border-color:var(--festival)}
.pill[data-cat="kaerwa"].active{background:var(--kaerwa);border-color:var(--kaerwa)}
.pill[data-cat="afterwork"].active{background:var(--afterwork);border-color:var(--afterwork)}
.pill[data-cat="bierfest"].active{background:var(--bierfest);border-color:var(--bierfest)}
.pill[data-cat="sonstige"].active{background:var(--sonstige);border-color:var(--sonstige)}
.pill[data-cat="russian"].active{background:#f472b6;border-color:#f472b6}
.view-toggle{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px}
.view-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.view-btn.active{background:var(--surface2);color:var(--text)}
/* STICKY BAR */
.sticky-bar{position:sticky;top:0;z-index:50;background:rgba(14,15,19,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.6rem 0}
.month-timeline{max-width:1300px;margin:0 auto;padding:0 1.5rem;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.month-timeline::-webkit-scrollbar{display:none}
.month-jump{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.month-jump:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.month-jump.has-events{color:var(--text)}
.month-jump.active-month{background:var(--accent);color:#0e0f13;border-color:var(--accent);font-weight:600}
.second-bar{max-width:1300px;margin:0 auto;padding:.5rem 1.5rem 0;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.quick-pills{display:flex;gap:5px;flex-wrap:wrap}
.qpill{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.qpill:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.qpill.active{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.25)}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;outline:none;margin-left:auto}
.sort-select option{background:#1e2029}
/* CALENDAR */
.cal-wrap{max-width:1300px;margin:1.5rem auto 4rem;padding:0 1.5rem}
.month-block{margin-bottom:3rem}
.month-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.month-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--text)}
.month-count{font-size:12px;color:var(--muted)}
.events-list{display:flex;flex-direction:column;gap:8px}
/* EVENT ROW */
.event-row{display:grid;grid-template-columns:64px 1fr auto;gap:1rem;align-items:start;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.event-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,var(--muted));border-radius:3px 0 0 3px}
.event-row:hover{background:var(--surface2);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.event-row.today-event{border-color:rgba(232,150,58,.45);background:linear-gradient(90deg,rgba(232,150,58,.06) 0%,var(--surface) 100%)}
.event-row.today-event::before{background:var(--accent)}
.event-row.soon-event{border-color:rgba(91,143,249,.35);background:linear-gradient(90deg,rgba(91,143,249,.05) 0%,var(--surface) 100%)}
.event-row.soon-event::before{background:var(--accent2)}
.event-date-col{text-align:center;padding-top:2px}
.event-day{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;line-height:1;color:var(--text)}
.event-month{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.event-dow{font-size:10px;color:var(--muted)}
.event-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:600;margin-bottom:3px}
.event-loc{font-size:12px;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.event-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:999px;border:1px solid;white-space:nowrap}
.badge-free{background:rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.3)}
.badge-date{background:transparent;color:var(--muted);border-color:var(--border)}
.badge-dc{background:rgba(167,139,250,.12);color:#c4b5fd;border-color:rgba(167,139,250,.3)}
.badge-new{background:rgba(232,150,58,.15);color:var(--accent);border-color:rgba(232,150,58,.3)}
.today-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--accent);color:#0e0f13;animation:pulse-today 2s infinite}
@keyframes pulse-today{0%,100%{opacity:1}50%{opacity:.6}}
.row-countdown{font-size:10px;font-weight:600;color:var(--accent);white-space:nowrap}
.event-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-top:2px}
.cat-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;color:#0e0f13;white-space:nowrap}
.heart-btn{background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:4px;color:var(--muted);transition:all .2s}
.heart-btn:hover{transform:scale(1.2)}
.heart-btn.saved{color:#f43f5e}
.going-btn{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--muted);transition:all .2s;border-radius:6px;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:11px}
.going-btn:hover{background:rgba(52,211,153,.1);color:#34d399}
.going-btn.going{color:#34d399;background:rgba(52,211,153,.12)}
.going-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.3)}
/* GRID */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.event-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cat-color,var(--muted))}
.event-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.event-card.today-event{border-color:rgba(232,150,58,.45);box-shadow:0 0 0 1px rgba(232,150,58,.2)}
.card-countdown{font-size:10px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:3px;margin-bottom:6px}
.card-date{font-size:12px;color:var(--muted);margin-bottom:8px}
.card-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:4px;line-height:1.25}
.card-loc{font-size:12px;color:var(--muted);margin-bottom:10px}
.card-desc{font-size:11px;color:rgba(240,240,240,.55);line-height:1.5;margin-bottom:10px}
.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
/* MAP */
.map-wrap{max-width:1300px;margin:1.5rem auto 4rem;padding:0 1.5rem}
#map{width:100%;height:520px;border-radius:16px;border:1px solid var(--border);overflow:hidden}
.leaflet-popup-content-wrapper{background:#1e2029!important;color:#f0f0f0!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-tip{background:#1e2029!important}
.leaflet-popup-content{margin:12px 16px!important}
.popup-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px}
.popup-loc{font-size:11px;color:#6b7280;margin-bottom:4px}
.popup-date{font-size:11px;color:#e8963a}
.map-no-results{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
/* PRACTICAL INFO */
.practical-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:1rem 0}
.practical-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.practical-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500}
.practical-value{font-size:13px;font-weight:500;color:var(--text)}
.practical-value.green{color:#34d399}
.practical-value.orange{color:var(--accent)}
.practical-value.blue{color:#60a5fa}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:20px;max-width:520px;width:100%;padding:2rem;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;transition:all .15s}
.modal-close:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.modal-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem}
.modal-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
.modal-date-loc{font-size:13px;color:var(--muted);margin-bottom:1.2rem;display:flex;flex-direction:column;gap:3px}
.modal-desc{font-size:14px;line-height:1.7;color:rgba(240,240,240,.7);margin-bottom:1.2rem}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.2rem}
/* MODAL ACTIONS */
#m-actions{display:flex;flex-direction:column;gap:10px;margin-top:1rem}
.modal-action-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.mas-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:7px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.mas-row{display:flex}
.mas-row-wrap{flex-wrap:wrap;gap:1px;background:var(--border)}
.mas-row-wrap .mas-btn{flex:1 1 calc(50% - 1px);min-width:110px;border-radius:0}
.mas-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 14px;border:none;background:transparent;color:var(--text);cursor:pointer;text-decoration:none;transition:background .15s;flex:1;white-space:nowrap}
.mas-btn:hover{background:rgba(255,255,255,.05)}
.mas-row .mas-btn:not(:last-child){border-right:1px solid var(--border)}
.mas-gmaps{color:#4ade80}.mas-apple{color:#60a5fa}.mas-wa{color:#4ade80}.mas-fb{color:#60a5fa}
.mas-link{color:#a78bfa}.mas-ticket{color:var(--accent)}.mas-ics{color:#a78bfa}
.mas-heart-idle{color:var(--muted)}.mas-heart-active{color:#f43f5e;background:rgba(244,63,94,.07)}
.mas-heart-active:hover{background:rgba(244,63,94,.12)}
.mas-going-idle{color:var(--muted)}.mas-going-active{color:#34d399;background:rgba(52,211,153,.08)}
.mas-going-active:hover{background:rgba(52,211,153,.14)}
.mas-going-row{display:flex;align-items:center}
.mas-going-counter{padding:10px 14px;border-right:1px solid var(--border);min-width:100px;text-align:center}
.mas-going-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#34d399;line-height:1;display:block}
.mas-going-sub{font-size:10px;color:var(--muted);display:block;margin-top:2px}
.mas-going-row .mas-btn{flex:1}
/* SIMILAR EVENTS */
.similar-section{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)}
.similar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.similar-items{display:flex;flex-direction:column;gap:6px}
.similar-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.similar-item:hover{background:var(--surface2);border-color:rgba(255,255,255,.15)}
.similar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.similar-info{flex:1;min-width:0}
.similar-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.similar-date{font-size:11px;color:var(--muted)}
/* WISHLIST */
.wishlist-btn{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#0e0f13;border:none;border-radius:999px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;z-index:60;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(232,150,58,.4);transition:transform .15s,box-shadow .15s}
.wishlist-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(232,150,58,.5)}
.wishlist-count{background:#0e0f13;color:var(--accent);border-radius:999px;padding:1px 7px;font-size:11px;font-weight:700}
.wishlist-panel{position:fixed;right:0;top:0;bottom:0;width:min(380px,100vw);background:var(--surface);border-left:1px solid rgba(255,255,255,.1);z-index:150;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.wishlist-panel.open{transform:translateX(0)}
.wishlist-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.wishlist-header h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700}
.wishlist-close{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px}
.wishlist-close:hover{color:var(--text)}
.wishlist-body{flex:1;overflow-y:auto;padding:1rem}
.wishlist-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
.wl-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.wl-item:hover{border-color:rgba(255,255,255,.15)}
.wl-item-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:3px}
.wl-item-date{font-size:11px;color:var(--muted)}
.wl-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:all .15s}
.wl-remove:hover{color:#f43f5e;background:rgba(244,63,94,.1)}
.wishlist-footer{padding:1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.wl-share-btn{width:100%;padding:10px;border-radius:9px;border:1px solid;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}

.back-to-top:hover{color:var(--text);border-color:rgba(255,255,255,.25)}

.mode-tab.active-party{background:var(--accent);color:#0e0f13;border-color:var(--accent)}
.mode-tab.active-family{background:#34d399;color:#0e0f13;border-color:#34d399}

padding:2.5rem 2rem;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}

let db = null;
let publicCounts = {};

const FB_PROJECT = 'viana-events';

const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;


function eventKey(e) {
  return e.name.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,'_').slice(0,50)+'_'+e.start;
}

async function loadPublicCounts() {
  try {
    const res = await fetch(`${FB_BASE}/event_going?key=${FB_API_KEY}&pageSize=200`);
    if(!res.ok) return;
    const data = await res.json();
    (data.documents||[]).forEach(doc => {
      const key = doc.name.split('/').pop();
      publicCounts[key] = parseInt(doc.fields?.count?.integerValue || 0);
    });
  } catch(err) { console.warn('Firebase load:', err); }
}

async function savePublicCount(e, delta) {
  const key = eventKey(e);
  const current = Math.max(0, (publicCounts[key] || 0) + delta);
  publicCounts[key] = current;
  try {
    await fetch(`${FB_BASE}/event_going/${key}?key=${FB_API_KEY}&updateMask.fieldPaths=count`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({fields:{count:{integerValue: current}}})
    });
  } catch(err) { console.warn('Firebase save:', err); }
  return current;
}

function getPublicCount(e) { return publicCounts[eventKey(e)] || 0; }

function dateStr(s,e) {
  const sd=new Date(s), ed=new Date(e);
  if(s===e) return `${sd.getDate()}. ${MONTHS_S[sd.getMonth()]} 2026`;
  if(sd.getMonth()===ed.getMonth()) return `${sd.getDate()}.–${ed.getDate()}. ${MONTHS_S[sd.getMonth()]} 2026`;
  return `${sd.getDate()}. ${MONTHS_S[sd.getMonth()]} – ${ed.getDate()}. ${MONTHS_S[ed.getMonth()]} 2026`;
}
function getDaysUntil(ds){ const today=new Date(); today.setHours(0,0,0,0); return Math.round((new Date(ds)-today)/86400000); }
function isThisWeek(ds){ const today=new Date();today.setHours(0,0,0,0);const d=new Date(ds),day=today.getDay(),mon=new Date(today);mon.setDate(today.getDate()-(day===0?6:day-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);return d>=mon&&d<=sun; }
function isThisMonth(ds){ const today=new Date(),d=new Date(ds);return d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear(); }
function isToday(ds){ const today=new Date();today.setHours(0,0,0,0);const d=new Date(ds);d.setHours(0,0,0,0);return d.getTime()===today.getTime(); }

function getFiltered() {
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  const q=searchTerm.toLowerCase(), today=new Date();today.setHours(0,0,0,0);
  let filtered=sourceEvents.filter(e=>{
    const matchCat=activeFilters.has('alle')?true:appMode==='family'?true:(activeFilters.has('free')&&e.free)||(activeFilters.has(e.cat));
    const matchSearch=!q||e.name.toLowerCase().includes(q)||e.loc.toLowerCase().includes(q)||(e.genre||'').toLowerCase().includes(q)||(e.desc||'').toLowerCase().includes(q);
    let matchQuick=true;
    if(quickFilter==='today') matchQuick=isToday(e.start);
    else if(quickFilter==='week') matchQuick=isThisWeek(e.start);
    else if(quickFilter==='month') matchQuick=isThisMonth(e.start);
    else if(quickFilter==='next'){const d=new Date(e.start);d.setHours(0,0,0,0);matchQuick=d>=today;}
    return matchCat&&matchSearch&&matchQuick;
  });
  if(sortMode==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name,'de'));
  else if(sortMode==='cat') filtered.sort((a,b)=>a.cat.localeCompare(b.cat)||a.start.localeCompare(b.start));
  else if(sortMode==='dist' && userLat!==null) filtered.sort((a,b)=>(getEventDist(a)||999)-(getEventDist(b)||999));
  else filtered.sort((a,b)=>a.start.localeCompare(b.start));

  // Distance radius filter
  if(maxDist > 0 && userLat !== null) {
    filtered = filtered.filter(e => {
      const d = getEventDist(e);
      return d === null || d <= maxDist;
    });
  }
  if(quickFilter==='next'){const d0=filtered.length?filtered[0].start:null;if(d0)filtered=filtered.filter(e=>e.start===d0);}
  return filtered;
}

function render() {
  const filtered=getFiltered();
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  document.getElementById('total-count').textContent=sourceEvents.length;
  document.getElementById('free-count').textContent=sourceEvents.filter(e=>e.free).length;
  if(viewMode==='map'){
    document.getElementById('cal').style.display='none';

  }
  document.getElementById('cal').style.display='';

function renderMap(filtered) {

  tl.innerHTML=html;
  tl.querySelectorAll('.month-jump').forEach(btn=>{

      const m=parseInt(btn.dataset.month), el=document.getElementById(`month-${m}`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
      tl.querySelectorAll('.month-jump').forEach(b=>b.classList.remove('active-month'));
      btn.classList.add('active-month');
    });

function updateScrollObserver() {
  const blocks=document.querySelectorAll('.month-block');
  if(!blocks.length)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const m=entry.target.id.replace('month-','');
        document.querySelectorAll('.month-jump').forEach(b=>b.classList.toggle('active-month',b.dataset.month===m));
      }
    });
  },{threshold:0.2});
  blocks.forEach(b=>obs.observe(b));
}

function updateCountdown() {
  const today=new Date();today.setHours(0,0,0,0);
  const future=getActiveEvents().filter(e=>new Date(e.start)>=today).sort((a,b)=>a.start.localeCompare(b.start));
  if(!future.length)return;
  const next=future[0], diff=Math.round((new Date(next.start)-today)/86400000);
  document.getElementById('cd-days').innerHTML=diff===0?'Heute!':diff===1?'Morgen!':`${diff}<span> Tage</span>`;

  document.getElementById('wl-count').textContent=total;
  btn.style.display=total>0?'flex':'none';
  renderWishlistPanel();
}

function renderWishlistPanel() {
  const body=document.getElementById('wl-body'), footer=document.getElementById('wl-footer');
  const saved=[...events,...familyEvents].filter(e=>wishlist.has(e.name+e.start)).sort((a,b)=>a.start.localeCompare(b.start));
  if(!saved.length){body.innerHTML='<div class="wishlist-empty">Noch keine Events gemerkt.<br>Klick auf 🤍 bei einem Event!</div>';footer.style.display='none';return;}
  footer.style.display='flex';
  body.innerHTML=saved.map(e=>{
    const idx=events.indexOf(e), col=CAT_COLORS[e.cat]||'#888', key=e.name+e.start;
    return `<div class="wl-item" onclick="openModal(${idx})"><div class="wl-item-name" style="color:${col}">❤️ ${e.name}</div><div class="wl-item-date">📅 ${dateStr(e.start,e.end)} · 📍 ${e.loc}</div><button class="wl-remove" onclick="event.stopPropagation();removeFromWishlist('${key}')">✕</button></div>`;
  }).join('');
}

function toggleWishlistModal(idx) {
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  const e=sourceEvents[idx], key=e.name+e.start, btn=document.getElementById('modal-heart-btn');
  if(wishlist.has(key)){wishlist.delete(key);if(btn){btn.textContent='🤍 Merken';btn.className='mas-btn mas-heart-idle';}showToast(`Entfernt: ${e.name}`);}
  else{wishlist.add(key);if(btn){btn.textContent='❤️ Gemerkt (entfernen)';btn.className='mas-btn mas-heart-active';}showToast(`Gemerkt: ${e.name} ❤️`);}
  saveWishlist();updateWishlistUI();render();

function toggleGoingModal(idx) {
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  const e=sourceEvents[idx], key=e.name+e.start, btn=document.getElementById('modal-going-btn'), wasGoing=goingList.has(key);
  if(wasGoing){ goingList.delete(key); if(btn){btn.textContent='📅 Ich gehe hin!';btn.className='mas-btn mas-going-idle';} showToast('Entfernt aus "Ich gehe hin"'); }
  else{ goingList.add(key); if(btn){btn.textContent='✅ Dabei! (entfernen)';btn.className='mas-btn mas-going-active';} showToast(`✅ ${e.name} – du bist dabei!`); }
  saveGoingList();
  savePublicCount(e, wasGoing?-1:1).then(n=>{
    const el=document.getElementById('modal-going-count'); if(el) el.textContent=n;
  });
  render(); updateWishlistUI();
}

// ── LOCATION & DISTANCE ───────────────────────────────────────────────────────
let userLat = null, userLon = null, maxDist = 0;

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getEventDist(e) {
  if(userLat===null) return null;
  const coords = getCoords(e.loc);
  return haversine(userLat, userLon, coords[0], coords[1]);
}

function distLabel(km) {
  if(km===null) return '';
  return km < 1 ? '< 1 km' : `${Math.round(km)} km`;
}

function setUserLocation(lat, lon, label) {
  userLat=lat; userLon=lon;
  localStorage.setItem('viana_loc', JSON.stringify({lat,lon,label}));
  const status=document.getElementById('loc-status');
  status.className='loc-status active';
  status.innerHTML=`📍 ${label}`;
  document.getElementById('loc-clear-btn').style.display='';
  // auto-switch sort to distance
  const sel=document.getElementById('sort-select');
  if(sel.value==='date'){sel.value='dist'; sortMode='dist';}
  render();
}

function clearUserLocation() {
  userLat=null; userLon=null;
  localStorage.removeItem('viana_loc');
  document.getElementById('loc-status').className='loc-status';
  document.getElementById('loc-status').innerHTML='';
  document.getElementById('loc-clear-btn').style.display='none';
  const sel=document.getElementById('sort-select');
  if(sel.value==='dist'){sel.value='date'; sortMode='date';}
  render();
}

async function geocodePLZ(plz) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${plz}&country=DE&format=json&limit=1`, {
      headers: {'Accept-Language':'de', 'User-Agent':'VianaEventsKalender/1.0'}
    });
    const data = await res.json();
    if(!data.length) { showToast('PLZ nicht gefunden'); return; }
    const {lat, lon, display_name} = data[0];
    const city = display_name.split(',')[0].trim();
    setUserLocation(parseFloat(lat), parseFloat(lon), `${plz} ${city}`);
  } catch(err) { showToast('Geocoding fehlgeschlagen'); }
}

function initLocation() {
  // restore saved location
  const saved = localStorage.getItem('viana_loc');
  if(saved) {
    const {lat,lon,label} = JSON.parse(saved);
    userLat=lat; userLon=lon;
    const status=document.getElementById('loc-status');
    status.className='loc-status active';
    status.innerHTML=`📍 ${label}`;
    document.getElementById('loc-clear-btn').style.display='';
  }

  document.getElementById('loc-geo-btn').addEventListener('click', () => {
    if(!navigator.geolocation) { showToast('Geolocation nicht verfügbar'); return; }
    const status=document.getElementById('loc-status');
    status.className='loc-status'; status.innerHTML='⏳ Ermittle Standort…';
    navigator.geolocation.getCurrentPosition(
      pos => setUserLocation(pos.coords.latitude, pos.coords.longitude, 'Aktueller Standort'),
      err => { status.innerHTML=''; showToast('Standort abgelehnt – bitte PLZ eingeben'); }
    );
  });

  document.getElementById('loc-clear-btn').addEventListener('click', clearUserLocation);

  document.getElementById('plz-input').addEventListener('keydown', e => {
    if(e.key==='Enter') {
      const plz = e.target.value.trim();
      if(/^\d{5}$/.test(plz)) geocodePLZ(plz);
      else showToast('Bitte eine gültige 5-stellige PLZ eingeben');
    }
  });

  document.getElementById('dist-select').addEventListener('change', e => {
    maxDist = parseInt(e.target.value);
    render();
  });
}

function copyDeepLink(url) {
  navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link kopiert!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('🔗 Link kopiert!');
  });
}

function downloadICS(idx) {
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  const e=sourceEvents[idx];
  const dtstart=e.start.replace(/-/g,'');
  const endDate=new Date(e.end);endDate.setDate(endDate.getDate()+1);
  const dtend=endDate.toISOString().slice(0,10).replace(/-/g,'');
  const desc=(e.desc||'').replace(/,/g,'\,').replace(/\n/g,'\\n');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Viana NBG Events//DE','BEGIN:VEVENT',`UID:${e.name.replace(/[^a-z0-9]/gi,'-')}-${e.start}@viana`,`DTSTART;VALUE=DATE:${dtstart}`,`DTEND;VALUE=DATE:${dtend}`,`SUMMARY:${e.name}`,`LOCATION:${e.loc}`,`DESCRIPTION:${desc}\nEintritt: ${e.price||'—'}\nÖPNV: ${e.oepnv||'—'}`,'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${e.name.replace(/[^a-zA-Z0-9]/g,'-')}.ics`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast(`📅 ${e.name} als ICS gespeichert`);
}

function renderSimilarEvents(currentIdx) {
  const sourceEvents = appMode === 'family' ? familyEvents : events;
  const current=sourceEvents[currentIdx];
  const similar=sourceEvents.filter((e,i)=>i!==currentIdx&&e.cat===current.cat).sort((a,b)=>Math.abs(new Date(a.start)-new Date(current.start))-Math.abs(new Date(b.start)-new Date(current.start))).slice(0,3);
  if(!similar.length)return;
  document.getElementById('m-similar').innerHTML=`<div class="similar-section"><div class="similar-title">Ähnliche Events</div><div class="similar-items">${similar.map(e=>{const idx=sourceEvents.indexOf(e),c=CAT_COLORS[e.cat]||'#34d399';return `<button class="similar-item" onclick="openModal(${idx})"><span class="similar-dot" style="background:${c}"></span><span class="similar-info"><span class="similar-name">${e.name}</span><span class="similar-date">📅 ${dateStr(e.start,e.end)} · 📍 ${e.loc}</span></span></button>`;}).join('')}</div></div>`;
}

function showSuggestions(q) {
  const el=document.getElementById('search-suggestions');
  if(!q||q.length<2){el.style.display='none';return;}
  const src=appMode==='family'?familyEvents:events;
  const matches=src.filter(e=>e.name.toLowerCase().includes(q)||e.loc.toLowerCase().includes(q)||(e.genre||'').toLowerCase().includes(q)).slice(0,7);
  if(!matches.length){el.style.display='none';return;}
  el.innerHTML=matches.map(e=>{
    const col=CAT_COLORS[e.cat]||'#888', idx=src.indexOf(e), diff=getDaysUntil(e.start);
    const cd=diff===0?'🔴 Heute!':diff>0&&diff<=14?`in ${diff}d`:'';
    return `<div class="suggestion-item" onclick="selectSuggestion(${idx})"><span class="suggestion-cat" style="background:${col}">${CAT_LABELS[e.cat]}</span><span class="suggestion-name">${e.name}</span><span class="suggestion-date">${cd||dateStr(e.start,e.end)}</span></div>`;
  }).join('');
  el.style.display='block';
}
function selectSuggestion(idx) {
  document.getElementById('search-suggestions').style.display='none';
  document.getElementById('search').value='';
  searchTerm='';render();
  setTimeout(()=>openModal(idx),50);
}

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  const cat=p.dataset.cat;
  if(cat==='alle'){
    activeFilters=new Set(['alle']);
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
  } else {
    activeFilters.delete('alle');
    document.getElementById('pill-alle').classList.remove('active');
    if(activeFilters.has(cat)){
      activeFilters.delete(cat);
      p.classList.remove('active');
      if(activeFilters.size===0){activeFilters.add('alle');document.getElementById('pill-alle').classList.add('active');}
    } else {
      activeFilters.add(cat);
      p.classList.add('active');
    }
  }
  render();
}));
